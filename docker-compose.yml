# Local development infrastructure.
# Production uses Supabase (Postgres + Storage) and Upstash (Redis);
# these containers exist only for local dev parity.
#
# Pin the compose project name so docker volumes (`berberica_postgres-data`
# etc.) stay stable regardless of which folder the repo is checked out
# into — otherwise renaming the workspace would orphan all dev data.
name: berberica

services:
  postgres:
    image: postgres:16-alpine
    container_name: scheduling-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scheduling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scheduling_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-scheduling}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-scheduling} -d ${POSTGRES_DB:-scheduling}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: scheduling-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: scheduling-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_dev_password}
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  minio-data:
